name: Validate solutions.json

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'solutions.json'
      - 'data/**'
      - 'solutions/**'
      - 'scripts/validate_solutions_json.py'
      - '.github/workflows/validate-solutions-json.yml'
  push:
    branches:
      - main
    paths:
      - 'solutions.json'
      - 'data/**'
      - 'solutions/**'
      - 'scripts/validate_solutions_json.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate solutions.json
        run: python scripts/validate_solutions_json.py
