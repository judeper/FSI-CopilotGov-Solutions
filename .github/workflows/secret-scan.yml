name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (OSS mode)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
