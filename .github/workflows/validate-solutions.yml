name: Validate Solutions

on:
  push:
    branches: [main]
    paths:
      - 'solutions/**'
      - 'scripts/common/**'
      - 'scripts/deployment/**'
      - 'scripts/validate-solutions.py'
  pull_request:
    branches: [main]
    paths:
      - 'solutions/**'
      - 'scripts/common/**'
      - 'scripts/deployment/**'
      - 'scripts/validate-solutions.py'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/validate-solutions.py
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$null) | Out-Null
          }
