name: Validate Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'data/solution-catalog.json'
      - 'solutions/**'
      - 'mkdocs.yml'
      - 'scripts/build-docs.py'
      - 'scripts/validate-documentation.py'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'data/solution-catalog.json'
      - 'solutions/**'
      - 'mkdocs.yml'
      - 'scripts/build-docs.py'
      - 'scripts/validate-documentation.py'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements-docs.txt
      - run: python scripts/build-docs.py
      - name: Check tier-applicability matrix is in lockstep with the catalog
        run: |
          if ! git diff --quiet -- docs/reference/tier-applicability.md; then
            echo "::error::docs/reference/tier-applicability.md is stale. Run 'python scripts/build-docs.py' and commit the regenerated matrix."
            git --no-pager diff -- docs/reference/tier-applicability.md
            exit 1
          fi
      - run: python scripts/validate-documentation.py
      - run: mkdocs build --strict
