name: SBOM (PR preview)

# PR-time visibility into dependency changes. Generates a CycloneDX SBOM for
# Python deps and the repo contents, and uploads them as build artifacts.
# No release, no signing, no attestations.

on:
  pull_request:
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/sbom-pr.yml'
  push:
    branches: [main]
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/sbom-pr.yml'

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CycloneDX generator
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cyclonedx-bom>=4,<6"

      - name: Generate Python dependency SBOM (requirements-docs.txt)
        if: hashFiles('requirements-docs.txt') != ''
        run: |
          cyclonedx-py requirements \
            -i requirements-docs.txt \
            -o sbom-python-docs.cdx.json \
            --output-format JSON

      - name: Generate repository-content SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-repo.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-preview-${{ github.event.pull_request.number || github.sha }}
          path: |
            sbom-python-docs.cdx.json
            sbom-repo.cdx.json
          if-no-files-found: warn
          retention-days: 14
