name: Validate Contracts

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'docs/reference/shared-modules-contract.md'
      - 'scripts/validate-contracts.py'
      - 'scripts/solution-config.yml'
  pull_request:
    branches: [main]
    paths:
      - 'data/**'
      - 'docs/reference/shared-modules-contract.md'
      - 'scripts/validate-contracts.py'
      - 'scripts/solution-config.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/validate-contracts.py
